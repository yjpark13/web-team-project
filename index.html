<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Travel</title>
    <link rel="stylesheet" href="landing.css">
</head>
<body>

    <main class="landing-page">
        <section class="left-panel">

            <div class="logo">
                ✈
            </div>

            <div class="hero-content">

                <h1 class="hero-title">
                    Discover<br>
                    the Beauty<br>
                    of Europe
                </h1>

                <p class="hero-desc">
                    Experience stunning landscapes,
                    rich history, and unforgettable
                    cultures across Europe.
                </p>

                <a href="../html/main.html" class="start-btn">
                    Start Your Journey
                </a>

            </div>

            <!-- 여행 루트 -->

                Amsterdam
                <span>✈</span>
                London
                <span>✈</span>
                Rome
                <span>✈</span>
                Berlin
                <span>✈</span>
                Madrid
            </div>

            <ul class="side-menu">
                <li class="menu-item">/ Netherlands</li>
                <li class="menu-item">/ United Kingdom</li>
                <li class="menu-item">/ Italy</li>
                <li class="menu-item">/ Germany</li>
                <li class="menu-item">/ Spain</li>
            </ul>

        </section>

        <section class="right-panel">
            <img src="image/spain.image/europe.png" alt="Europe Travel">
        </section>

    </main>
